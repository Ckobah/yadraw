services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: yadraw-postgres
    environment:
      POSTGRES_DB: yadraw
      POSTGRES_USER: yadraw
      POSTGRES_PASSWORD: yadraw
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../packages/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yadraw -d yadraw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yadraw-redis
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    image: minio/minio:latest
    container_name: yadraw-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yadraw
      MINIO_ROOT_PASSWORD: yadraw-secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
