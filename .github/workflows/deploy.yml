name: Deploy to us-vmmini

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: yadraw_test
          POSTGRES_USER: yadraw
          POSTGRES_PASSWORD: yadraw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yadraw -d yadraw_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: |
          docker run --rm -v "$PWD:/repo" \
            zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            git /repo --redact --no-banner
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:postgres
        env:
          DATABASE_URL_TEST: postgres://yadraw:yadraw@127.0.0.1:5432/yadraw_test
      - run: npm run v2:migrations:apply --workspace @yadraw/api
        env:
          V2_DATABASE_URL: postgres://yadraw:yadraw@127.0.0.1:5432/yadraw_test
      - run: npm run v2:migrations:apply --workspace @yadraw/api
        env:
          V2_DATABASE_URL: postgres://yadraw:yadraw@127.0.0.1:5432/yadraw_test
      - run: npm run build
      - name: Reject server secrets in browser bundle
        run: |
          if grep -R -E "V2_USER_ID|x-yadraw-user-id|x-yadraw-internal-secret|S3_SECRET_ACCESS_KEY|SUPABASE_SERVICE_ROLE_KEY" apps/web/.next/static; then
            exit 1
          fi

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          if_key_exists: replace
          name: id_ed25519

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/yadraw && \
             if command -v tailscale >/dev/null 2>&1; then sudo -n tailscale set --ssh; fi && \
             if systemctl cat ssh.service >/dev/null 2>&1; then sudo -n systemctl enable --now ssh; elif systemctl cat sshd.service >/dev/null 2>&1; then sudo -n systemctl enable --now sshd; fi && \
             git fetch origin main && git show origin/main:scripts/deploy-production.sh > /tmp/yadraw-deploy.sh && \
             chmod +x /tmp/yadraw-deploy.sh && /tmp/yadraw-deploy.sh"

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/smoke-production.mjs
